<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110" width="360" height="440" role="img" aria-label="Devan Patel logo">
  <title>Devan Patel</title>
  <!-- Forest green background -->
  <rect x="0" y="0" width="90" height="110" fill="#1E3A2F"/>
  <!-- Base platform -->
  <rect x="4"  y="98" width="82" height="8"  fill="#F5F0EA"/>
  <!-- Left pillar shaft -->
  <rect x="8"  y="18" width="16" height="80" fill="#F5F0EA"/>
  <!-- Left capital -->
  <rect x="4"  y="12" width="24" height="7"  fill="#F5F0EA"/>
  <!-- Left abacus -->
  <rect x="8"  y="6"  width="16" height="7"  fill="#F5F0EA"/>
  <!-- Centre pillar shaft (taller) -->
  <rect x="37" y="10" width="16" height="88" fill="#F5F0EA"/>
  <!-- Centre capital -->
  <rect x="33" y="4"  width="24" height="7"  fill="#F5F0EA"/>
  <!-- Centre abacus -->
  <rect x="37" y="0"  width="16" height="5"  fill="#F5F0EA"/>
  <!-- Right pillar shaft -->
  <rect x="66" y="18" width="16" height="80" fill="#F5F0EA"/>
  <!-- Right capital -->
  <rect x="62" y="12" width="24" height="7"  fill="#F5F0EA"/>
  <!-- Right abacus -->
  <rect x="66" y="6"  width="16" height="7"  fill="#F5F0EA"/>
</svg>
